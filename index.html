<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
    <title>Projeto X-Man</title>
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/index.css">
    <link rel="stylesheet" href="./src/css/responsivo.css">
</head>
<body>
    <header class="cabecalho">
        <img src="./src/imagens/logo.svg" alt="logo x-man" class="logo">
    </header>

    <main class="selecao-de-personagens">
        <section class="personagens">
            <h1 class="titulo">Selecione um Personagem</h1>
            <ul class="lista-de-personagens">
                <li class="personagem selecionado" id="ciclope" data-name="ciclope" data-description="Ciclope (Scott Summers). Seu poder principal consiste em disparar poderosos feixes de energia pura pelos olhos. Ele é mundialmente reconhecido por sua disciplina."><img src="./src/imagens/card-ciclope.jpg" alt=""></li>
                <li class="personagem" id="jean-grey" data-name="jean-grey" data-description="Jean Grey é uma das mutantes mais poderosas do Universo Marvel. Membro fundadora dos X-Men, ela possui dons psíquicos de nível Ômega (telepatia e telecinese) e é a principal hospedeira da entidade cósmica Força Fênix"><img src="./src/imagens/card-jean-grey.jpg" alt=""></li>
                <li class="personagem" id="lince-negra" data-name="lince-negra" data-description="A Lince Negra (Kitty Pryde) é uma das mutantes mais icônicas da Marvel Comics. Conhecida por sua inteligência, carisma e habilidade de atravessar paredes (intangibilidade),"><img src="./src/imagens/card-lince-negra.jpg" alt=""></li>
                <li class="personagem" id="tempestade" data-name="tempestade" data-description="Tempestade (Ororo Munroe) é uma das mutantes mais poderosas do universo Marvel, famosa por sua capacidade de manipular o clima e a atmosfera."><img src="./src/imagens/card-tempestade.jpg" alt=""></li>
                <li class="personagem" id="vampira" data-name="vampira" data-description="Vampira ela é uma mutante cujo poder é também uma "maldição": a incapacidade de ter contato físico com outras pessoas sem lhes sugar a energia"><img src="./src/imagens/card-vampira.jpg" alt=""></li>
                <li class="personagem" id="wolverine" data-name="wilverine" data-description="Wolverine (cujo nome verdadeiro é James Howlett, mas amplamente conhecido como Logan) é um dos mutantes mais famosos da Marvel Comics."><img src="./src/imagens/card-wolverine.jpg" alt=""></li>
                <li class="personagem" id="noturno" data-name="noturno" data-description="Noturno (Kurt Wagner) é um icônico mutante dos X-Men. Com aparência demoníaca (pele azul, cauda e olhos amarelos), ele é um mestre acrobata com o poder de teletransporte."><img src="./src/imagens/card-noturno.jpg" alt=""></li>
                <li class="personagem" id="magneto" data-name="magneto" data-description="Magneto (nascido Max Eisenhardt e mais tarde conhecido como Erik Magnus Lehnsherr) é um dos maiores e mais complexos personagens da Marvel Comics. Criado por Stan Lee e Jack Kirby, "><img src="./src/imagens/card-magneto.jpg" alt=""></li>
            </ul>
        </section>
        <section class="personagem-selecionado">
            <img class="personagem-grande" src="./src/imagens/card-ciclope.png" alt="">
            <div class="imformacoes-personagem">
                <h2 class="nome-personagem" id="nome-personagem">Ciclope</h2>
                <p class="descricao-personagem" id="descricao-personagem">Ciclope (Scott Summers). Seu poder principal consiste em disparar poderosos feixes de energia pura pelos olhos. Ele é mundialmente reconhecido por sua disciplina.</p>
            </div>
        </section>
    </main>
    <script src="./src/js/index.js"></script>
</body>

</html>
